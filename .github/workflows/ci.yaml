name: CI Pipeline

on:
  push:
    branches: [main]          # Push → Smoke tests

  schedule:
    - cron: "0 2 * * *"       # Daily regression at 2 AM UTC

  workflow_dispatch:          # Manual trigger
    inputs:
      test_type:
        description: "Select test suite"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - sanity
          - regression

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      REPORTS_DIR: reports
      LOGS_DIR: logs
      SCREENSHOTS_DIR: screenshots

    steps:

      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Prepare artifact folders
      - name: Clean previous artifacts
        run: |
          mkdir -p reports logs screenshots
          rm -rf reports/* logs/* screenshots/*

      # Step 4: Build Docker image
      - name: Build Docker image
        run: docker build -t my-framework:latest .

      # Step 5: Decide which tests to run
      - name: Set test marker
        id: marker
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "marker=smoke" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "schedule" ]; then
            echo "marker=regression" >> $GITHUB_OUTPUT
          else
            echo "marker=${{ github.event.inputs.test_type }}" >> $GITHUB_OUTPUT
          fi

      # Step 6: Run tests inside Docker
      - name: Run tests inside Docker
        run: |
          docker run --rm \
          -v ${{ github.workspace }}/reports:/app/reports \
          -v ${{ github.workspace }}/logs:/app/logs \
          -v ${{ github.workspace }}/screenshots:/app/screenshots \
          my-framework:latest pytest -m "${{ steps.marker.outputs.marker }}"

      # Step 7: Upload reports
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/

      # Step 8: Upload screenshots
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/

      # Step 9: Upload logs
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/





