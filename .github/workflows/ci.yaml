name: CI Pipeline

# Trigger pipeline
on:
  push:
    branches: [main]       # full regression on main
  pull_request:
    branches: [main]       # smoke tests on PR

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      REPORTS_DIR: reports
      LOGS_DIR: logs
      SCREENSHOTS_DIR: screenshots

    steps:
      # Step 1: Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 3: Clean old reports/logs/screenshots
      - name: Clean previous artifacts
        run: |
          mkdir -p $REPORTS_DIR $LOGS_DIR $SCREENSHOTS_DIR
          rm -rf $REPORTS_DIR/* $LOGS_DIR/* $SCREENSHOTS_DIR/*

      # Step 4: Build Docker image
      - name: Build Docker image
        run: docker build -t my-framework:latest .

      # Step 5: Run tests in Docker
      - name: Run tests inside Docker
        run: |
          docker run --rm \
          -v ${{ github.workspace }}/$REPORTS_DIR:/app/reports \
          -v ${{ github.workspace }}/$LOGS_DIR:/app/logs \
          -v ${{ github.workspace }}/$SCREENSHOTS_DIR:/app/screenshots \
          my-framework:latest

      # Step 6: Upload test reports
      - name: Upload Test Reports
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: ${{ github.workspace }}/$REPORTS_DIR

      # Step 7: Upload screenshots
      - name: Upload Screenshots
        uses: actions/upload-artifact@v3
        with:
          name: screenshots
          path: ${{ github.workspace }}/$SCREENSHOTS_DIR

      # Step 8: Upload logs
      - name: Upload Logs
        uses: actions/upload-artifact@v3
        with:
          name: logs
          path: ${{ github.workspace }}/$LOGS_DIR